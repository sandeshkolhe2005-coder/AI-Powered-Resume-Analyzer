version: '3.8'

services:
  # Database Service (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: ats_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: resume_analyzer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # Message Broker & Result Cache (Redis)
  redis:
    image: redis:7-alpine
    container_name: ats_redis
    ports:
      - "6379:6379"
    restart: always

  # Vector Database (Qdrant)
  qdrant:
    image: qdrant/qdrant:v1.8.0
    container_name: ats_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  # FastAPI Backend API
  backend:
    build: ./backend
    container_name: ats_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password123@db:5432/resume_analyzer
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - UPLOAD_DIR=uploads
    depends_on:
      - db
      - redis
      - qdrant
    volumes:
      - backend_uploads:/app/uploads
    restart: always

  # Celery Background Processing Worker
  celery_worker:
    build: ./backend
    container_name: ats_celery_worker
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:password123@db:5432/resume_analyzer
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - UPLOAD_DIR=uploads
    depends_on:
      - db
      - redis
      - qdrant
    volumes:
      - backend_uploads:/app/uploads
    restart: always

  # React 19 Frontend App
  frontend:
    build: ./frontend
    container_name: ats_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
  qdrant_data:
  backend_uploads:
